<!DOCTYPE html>
<html>
<head>
    <title>Image Path Test</title>
</head>
<body>
    <h1>Fire Exit Image Test</h1>
    
    <h2>Test 1: Public folder path</h2>
    <img src="/assets/images/icons/fire-exit.jpg" alt="Fire Exit Public" style="border: 2px solid red; margin: 10px;">
    <br>
    
    <h2>Test 2: Check if image loads</h2>
    <script>
        const img = new Image();
        img.onload = function() {
            console.log('✅ Image loaded successfully from public folder');
            document.write('<p style="color: green;">✅ Image loaded: /assets/images/icons/fire-exit.jpg</p>');
        };
        img.onerror = function() {
            console.log('❌ Failed to load image from public folder');
            document.write('<p style="color: red;">❌ Failed to load: /assets/images/icons/fire-exit.jpg</p>');
        };
        img.src = '/assets/images/icons/fire-exit.jpg';
    </script>
    
    <h2>Test 3: Current directory structure</h2>
    <script>
        // This will show what paths are available
        console.log('Current location:', window.location.href);
        console.log('Testing image path:', '/assets/images/icons/fire-exit.jpg');
    </script>
</body>
</html>
